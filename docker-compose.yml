services:
  postgres:
    image: timescale/timescaledb-ha:pg18
    container_name: takumi-agent-postgres
    restart: unless-stopped
    ports:
      - "0.0.0.0:7432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-takumiai_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-takumiai_agent_db}
    volumes:
      - agent_postgres_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-takumiai_agent} -d ${POSTGRES_DB:-takumiai_agent_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9-alpine
    container_name: takumi-agent-valkey
    restart: unless-stopped
    ports:
      - "0.0.0.0:7379:6379"
    command: valkey-server --requirepass ${VALKEY_PASSWORD}
    environment:
      VALKEY_PASSWORD: ${VALKEY_PASSWORD}
    volumes:
      - agent_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agent_postgres_data:
  agent_valkey_data:
